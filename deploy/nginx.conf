# ============================================================
# nginx configuration for VLM Intelligent CCTV System
# ============================================================
#
# Architecture:
#   nginx (80/443) → frontend_server (127.0.0.1:8002)
#   frontend_server internally proxies to:
#     - model_server (127.0.0.1:8000)
#     - db_server    (127.0.0.1:8001)
#
# Installation:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/vlm-cctv
#   sudo ln -sf /etc/nginx/sites-available/vlm-cctv /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# After DNS is pointing to this server:
#   sudo certbot --nginx -d YOUR_DOMAIN --non-interactive --agree-tos -m YOUR_EMAIL
# ============================================================

upstream vlm_frontend {
    server 127.0.0.1:8002;
}

server {
    listen 80;
    server_name _;

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # --- Proxy everything to frontend_server ---
    location / {
        proxy_pass http://vlm_frontend;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for /ws/events via frontend proxy)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running MJPEG streams
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;
    }

    # --- Static files (optional, if frontend serves them) ---
    # location /static/ {
    #     alias /home/ubuntu/vlm_new_deploy/frontend_server/static/;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }

    # Health check (direct, no proxy)
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    client_max_body_size 100M;
}
